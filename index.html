<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Life Line - Tawuniya Graphic Language</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@250;300;350;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Commissioner', sans-serif; margin: 0; overflow: hidden; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Math & Geometry Engine ---
    const rotatePoints = (pts, deg) => {
      if (!deg) return pts;
      const rad = (deg * Math.PI) / 180;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);
      return pts.map(p => ({ ...p, x: p.x * cos - p.y * sin, y: p.x * sin + p.y * cos }));
    };

    const cleanPoly = (pts) => {
      let clean = [];
      for (let i = 0; i < pts.length; i++) {
        let p = pts[i];
        if (clean.length === 0) { clean.push(p); continue; }
        let prev = clean[clean.length - 1];
        if (Math.hypot(p.x - prev.x, p.y - prev.y) > 0.1) {
          clean.push(p);
        } else {
          if (p.isBridgeCorner) prev.isBridgeCorner = true;
          if (p.isOuterCutoff) prev.isOuterCutoff = true;
          if (p.isVBridgeCorner) prev.isVBridgeCorner = true;
          if (p.isSharp) prev.isSharp = true;
        }
      }
      if (clean.length > 1 && Math.hypot(clean[0].x - clean[clean.length - 1].x, clean[0].y - clean[clean.length - 1].y) < 0.1) {
        if (clean[clean.length - 1].isBridgeCorner) clean[0].isBridgeCorner = true;
        if (clean[clean.length - 1].isOuterCutoff) clean[0].isOuterCutoff = true;
        if (clean[clean.length - 1].isVBridgeCorner) clean[0].isVBridgeCorner = true;
        if (clean[clean.length - 1].isSharp) clean[0].isSharp = true;
        clean.pop();
      }
      let finalClean = [];
      for (let i = 0; i < clean.length; i++) {
        let prev = clean[(i - 1 + clean.length) % clean.length];
        let curr = clean[i];
        let next = clean[(i + 1) % clean.length];
        let dx1 = curr.x - prev.x, dy1 = curr.y - prev.y;
        let dx2 = next.x - curr.x, dy2 = next.y - curr.y;
        let cross = dx1 * dy2 - dy1 * dx2;
        let dot = dx1 * dx2 + dy1 * dy2;
        if (Math.abs(cross) < 0.1 && dot > 0) continue; 
        finalClean.push(curr);
      }
      return finalClean.length >= 3 ? finalClean : clean;
    };

    const roundPolygon = (pts, ratio, lineModeBridgeCap, outerRatio = 0.6, vBridgeRatio = 0.6) => {
      if (ratio <= 0.001 && outerRatio <= 0.001 && vBridgeRatio <= 0.001) return "M " + pts.map(p => `${p.x},${p.y}`).join(" L ") + " Z";
      
      const n = pts.length;
      const edges = [];
      for (let i = 0; i < n; i++) {
        let dx = pts[(i+1)%n].x - pts[i].x;
        let dy = pts[(i+1)%n].y - pts[i].y;
        edges.push({ dx, dy, len: Math.hypot(dx, dy) });
      }
      
      let d = "";
      for (let i = 0; i < n; i++) {
        let p = pts[i];
        let currentRatio = ratio;
        if (p.isOuterCutoff) currentRatio = outerRatio;
        else if (p.isVBridgeCorner) currentRatio = vBridgeRatio;
        if (p.isSharp) currentRatio = 0;

        let prevEdge = edges[(i-1+n)%n];
        let nextEdge = edges[i];
        let T_max = Math.min(prevEdge.len, nextEdge.len) / 2.0;
        
        if (lineModeBridgeCap !== undefined && p.isBridgeCorner) {
          T_max = Math.min(T_max, lineModeBridgeCap.maxT);
        }
        
        let T = T_max * currentRatio;
        if (T < 0.1 || currentRatio === 0) {
          d += `${i === 0 ? 'M' : 'L'} ${p.x},${p.y} `;
          continue;
        }
        
        let dot = (-prevEdge.dx) * nextEdge.dx + (-prevEdge.dy) * nextEdge.dy;
        let cross = (-prevEdge.dx) * nextEdge.dy - (-prevEdge.dy) * nextEdge.dx;
        let alpha = Math.atan2(Math.abs(cross), dot);
        let phi = Math.PI - alpha;
        let circle_kappa = Math.abs(phi) < 0.0001 ? 2.0/3.0 : (4.0/3.0) * Math.tan(phi/4.0) / Math.tan(phi/2.0);
        circle_kappa = Math.max(0, Math.min(circle_kappa, 1.0)); 
        
        let t1 = { x: p.x + (-prevEdge.dx / prevEdge.len) * T, y: p.y + (-prevEdge.dy / prevEdge.len) * T };
        let t2 = { x: p.x + (nextEdge.dx / nextEdge.len) * T, y: p.y + (nextEdge.dy / nextEdge.len) * T };
        let c1 = { x: t1.x + (p.x - t1.x) * circle_kappa, y: t1.y + (p.y - t1.y) * circle_kappa };
        let c2 = { x: t2.x + (p.x - t2.x) * circle_kappa, y: t2.y + (p.y - t2.y) * circle_kappa };
        
        d += `${i === 0 ? 'M' : 'L'} ${t1.x},${t1.y} `;
        d += `C ${c1.x},${c1.y} ${c2.x},${c2.y} ${t2.x},${t2.y} `;
      }
      return d + "Z";
    };

    const generateGeometry = ({
      layoutMode, timelineSubMode, wavyLine, stepComposition, stepDistance, shapeCount, patternRowCount, patternRowSpacing,
      pillLength, pillHeight, bridgeThickness, bridgeGap, elementShape,
      loopFillRatio, rotation, infiniteEdges, verticalModeOn,
      vLengths, vHeights, vGaps, vRowSpacings,
      gridPills, gridHBridges, gridVBridges, halftonePixels,
      waveFrequency, waveAmplitude, swaps, library
    }) => {
      let pathDataArray = [];
      let swapCenters = [];
      let viewBox = "";

      const h = Math.max(0, bridgeThickness / 2.0);
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      let padX = 40, padY = 40;

      // Fixed rounding for new spec
      const roundingRatio = 0.6;
      const outerRoundingRatio = 0.6;
      const vBridgeRoundingRatio = 0.6;
      const isSmoothPill = elementShape === 'smooth-pill';

      if (layoutMode === 'timeline' || layoutMode === 'ecosystem' || layoutMode === 'halftone') {
        const N = Math.max(1, shapeCount);
        const rows = (layoutMode === 'ecosystem' || layoutMode === 'halftone') ? patternRowCount : 1;
        const spacing = (layoutMode === 'ecosystem' || layoutMode === 'halftone') ? patternRowSpacing : 0;
        const HUGE_EXT = 8000; 

        let cy_arr = [], y_pos = [];
        for (let r = 0; r < rows; r++) {
            if (r === 0) y_pos.push(0);
            else y_pos.push(y_pos[r - 1] + spacing * vRowSpacings[r - 1]);
        }
        let center_offset = rows > 1 ? y_pos[rows - 1] / 2 : 0;
        cy_arr = y_pos.map(y => y - center_offset);

        let W_grid = [], H_grid = [], I_grid = [], BL_grid = [];
        let activePillMask = Array.from({length: rows}, () => Array(N).fill(true));

        if (layoutMode === 'timeline' && swaps) {
            for (let c = 0; c < N; c++) {
                if (swaps[c]) activePillMask[0][c] = false; 
            }
        }

        for(let r=0; r<rows; r++) {
            let W = [], H_arr = [], I_arr = [], BL = [];
            let max_H = Infinity;
            if (r > 0) max_H = Math.min(max_H, (cy_arr[r] - cy_arr[r-1]) / 2);
            if (r < rows - 1) max_H = Math.min(max_H, (cy_arr[r+1] - cy_arr[r]) / 2);

            for (let c=0; c<N; c++) {
                W.push(pillLength * vLengths[r][c]);
                let desired_H = (pillHeight / 2.0) * vHeights[r][c];
                let safe_H = Math.min(desired_H, max_H - 0.5); 
                let H_final = Math.max(h + 0.1, safe_H);
                H_arr.push(H_final); 
                // Incline logic tied to elementShape
                I_arr.push(isSmoothPill ? H_final * 0.8625 : 0);
                BL.push(bridgeGap * vGaps[r][c]);
            }
            W_grid.push(W); H_grid.push(H_arr); I_grid.push(I_arr); BL_grid.push(BL);
        }

        let cx_grid = [];
        for (let r = 0; r < rows; r++) {
            let row_cx = [], curr_x = 0;
            for (let c = 0; c < N; c++) {
                if (c === 0) row_cx.push(0);
                else {
                    curr_x += W_grid[r][c-1]/2 + BL_grid[r][c] + W_grid[r][c]/2;
                    row_cx.push(curr_x);
                }
            }
            cx_grid.push(row_cx);
        }

        if (layoutMode === 'halftone' && halftonePixels) {
            let local_min_cx = Infinity, local_max_cx = -Infinity;
            let local_min_cy = Infinity, local_max_cy = -Infinity;
            for (let r = 0; r < rows; r++) {
                local_min_cy = Math.min(local_min_cy, cy_arr[r]);
                local_max_cy = Math.max(local_max_cy, cy_arr[r]);
                for (let c = 0; c < N; c++) {
                    local_min_cx = Math.min(local_min_cx, cx_grid[r][c]);
                    local_max_cx = Math.max(local_max_cx, cx_grid[r][c]);
                }
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < N; c++) {
                    let cx = cx_grid[r][c];
                    let cy = cy_arr[r];
                    let px_pct = local_max_cx === local_min_cx ? 0.5 : (cx - local_min_cx) / (local_max_cx - local_min_cx);
                    let py_pct = local_max_cy === local_min_cy ? 0.5 : (cy - local_min_cy) / (local_max_cy - local_min_cy);
                    
                    let ix = Math.floor(px_pct * (halftonePixels.w - 1));
                    let iy = Math.floor(py_pct * (halftonePixels.h - 1));
                    let lum = halftonePixels.lums[iy * halftonePixels.w + ix];
                    
                    let dotScale = 1.0 - lum; 
                    
                    let max_H = Infinity;
                    if (r > 0) max_H = Math.min(max_H, (cy_arr[r] - cy_arr[r-1]) / 2);
                    if (r < rows - 1) max_H = Math.min(max_H, (cy_arr[r+1] - cy_arr[r]) / 2);

                    let newH = (pillHeight / 2.0) * (dotScale * 1.5);
                    H_grid[r][c] = Math.max(h + 0.1, Math.min(newH, max_H - 0.5));
                    I_grid[r][c] = isSmoothPill ? H_grid[r][c] * 0.8625 : 0;
                    
                    if (dotScale < 0.10) activePillMask[r][c] = false;
                }
            }
        }

        let next = new Map();
        let coords = new Map();
        const addLink = (r1, c1, p1, r2, c2, p2) => next.set(`${r1},${c1},${p1}`, `${r2},${c2},${p2}`);
        const vMode = verticalModeOn && (layoutMode === 'ecosystem' || layoutMode === 'halftone');

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < N; c++) {
                let cx = cx_grid[r][c], cy = cy_arr[r];
                let angleRad = 0;

                let startX = cx_grid[r][0];
                let totalLength = cx_grid[r][N - 1] - startX;
                if (totalLength === 0) totalLength = 1;

                if (layoutMode === 'timeline') {
                    if (timelineSubMode === 'wave') {
                        let normX = (cx - startX) / totalLength;
                        cy += Math.sin(normX * waveFrequency * Math.PI * 2) * waveAmplitude;
                        angleRad = Math.atan(waveAmplitude * Math.cos(normX * waveFrequency * Math.PI * 2) * (waveFrequency * Math.PI * 2 / totalLength));
                    } else if (timelineSubMode === 'steps') {
                        let t = N > 1 ? c / (N - 1) : 0;
                        let totalH = stepDistance * (N - 1);
                        if (stepComposition === 'up') cy -= c * stepDistance;
                        else if (stepComposition === 'down') cy += c * stepDistance;
                        else if (stepComposition === 'up-curve') cy -= Math.pow(t, 2) * totalH;
                        else if (stepComposition === 'down-curve') cy += Math.pow(t, 2) * totalH;
                    }
                }

                let cosA = Math.cos(angleRad);
                let sinA = Math.sin(angleRad);

                let W = W_grid[r][c], H = H_grid[r][c], inc = I_grid[r][c], h_bridge = h;
                let isPillOn = (!vMode || gridPills[r][c]) && activePillMask[r][c];

                let hasN = vMode && r > 0 && gridVBridges[r-1][c] && activePillMask[r-1][c] && activePillMask[r][c];
                let hasS = vMode && r < rows - 1 && gridVBridges[r][c] && activePillMask[r+1][c] && activePillMask[r][c];
                let hasW = c > 0 && (!vMode || gridHBridges[r][c-1]) && (activePillMask[r][c-1] || (layoutMode === 'timeline' && swaps && swaps[c-1])) && (activePillMask[r][c] || (layoutMode === 'timeline' && swaps && swaps[c]));
                let hasE = c < N - 1 && (!vMode || gridHBridges[r][c]) && (activePillMask[r][c+1] || (layoutMode === 'timeline' && swaps && swaps[c+1])) && (activePillMask[r][c] || (layoutMode === 'timeline' && swaps && swaps[c]));

                if (!isPillOn && !hasN && !hasS && !hasE && !hasW) continue;

                let cutW = !hasW && !(infiniteEdges && c === 0);
                let cutE = !hasE && !(infiniteEdges && c === N - 1);

                let local_pts = {};
                if (isPillOn) {
                    let get_y = (dx) => {
                        if (inc <= 0.001) return -H;
                        let dx_flat_left = -W/2 + inc, dx_flat_right = W/2 - inc;
                        if (dx >= dx_flat_left && dx <= dx_flat_right) return -H;
                        let dx_start_left = -W/2 + inc*(h_bridge/H), dx_end_right = W/2 - inc*(h_bridge/H);
                        if (dx < dx_flat_left) {
                            if (Math.abs(dx_flat_left - dx_start_left) < 0.001) return -H;
                            let t = (dx - dx_start_left) / (dx_flat_left - dx_start_left);
                            return -h_bridge + Math.max(0, Math.min(1, t)) * (-H - (-h_bridge));
                        } else {
                            if (Math.abs(dx_end_right - dx_flat_right) < 0.001) return -H;
                            let t = (dx - dx_flat_right) / (dx_end_right - dx_flat_right);
                            return -H + Math.max(0, Math.min(1, t)) * (-h_bridge - (-H));
                        }
                    };
                    local_pts.W_T = {x: -W/2 + inc*(h_bridge/H), y: -h_bridge, isBridgeCorner: hasW, isOuterCutoff: cutW};
                    local_pts.NW  = {x: -W/2 + inc, y: -H, isOuterCutoff: cutW};
                    local_pts.N_L = {x: -h_bridge, y: get_y(-h_bridge), isBridgeCorner: hasN, isVBridgeCorner: hasN, isOuterCutoff: !hasN};
                    local_pts.N_R = {x: h_bridge, y: get_y(h_bridge), isBridgeCorner: hasN, isVBridgeCorner: hasN, isOuterCutoff: !hasN};
                    local_pts.NE  = {x: W/2 - inc, y: -H, isOuterCutoff: cutE};
                    local_pts.E_T = {x: W/2 - inc*(h_bridge/H), y: -h_bridge, isBridgeCorner: hasE, isOuterCutoff: cutE};
                    local_pts.E_B = {x: W/2 - inc*(h_bridge/H), y: h_bridge, isBridgeCorner: hasE, isOuterCutoff: cutE};
                    local_pts.SE  = {x: W/2 - inc, y: H, isOuterCutoff: cutE};
                    local_pts.S_R = {x: h_bridge, y: -get_y(h_bridge), isBridgeCorner: hasS, isVBridgeCorner: hasS, isOuterCutoff: !hasS};
                    local_pts.S_L = {x: -h_bridge, y: -get_y(-h_bridge), isBridgeCorner: hasS, isVBridgeCorner: hasS, isOuterCutoff: !hasS};
                    local_pts.SW  = {x: -W/2 + inc, y: H, isOuterCutoff: cutW};
                    local_pts.W_B = {x: -W/2 + inc*(h_bridge/H), y: h_bridge, isBridgeCorner: hasW, isOuterCutoff: cutW};
                } else {
                    local_pts.W_T = {x: -h_bridge, y: -h_bridge, isBridgeCorner: hasW, isOuterCutoff: cutW};
                    local_pts.NW  = {x: -h_bridge, y: -h_bridge, isOuterCutoff: cutW};
                    local_pts.N_L = {x: -h_bridge, y: -h_bridge, isBridgeCorner: hasN, isVBridgeCorner: hasN, isOuterCutoff: !hasN};
                    local_pts.N_R = {x: h_bridge, y: -h_bridge, isBridgeCorner: hasN, isVBridgeCorner: hasN, isOuterCutoff: !hasN};
                    local_pts.NE  = {x: h_bridge, y: -h_bridge, isOuterCutoff: cutE};
                    local_pts.E_T = {x: h_bridge, y: -h_bridge, isBridgeCorner: hasE, isOuterCutoff: cutE};
                    local_pts.E_B = {x: h_bridge, y: h_bridge, isBridgeCorner: hasE, isOuterCutoff: cutE};
                    local_pts.SE  = {x: h_bridge, y: h_bridge, isOuterCutoff: cutE};
                    local_pts.S_R = {x: h_bridge, y: h_bridge, isBridgeCorner: hasS, isVBridgeCorner: hasS, isOuterCutoff: !hasS};
                    local_pts.S_L = {x: -h_bridge, y: h_bridge, isBridgeCorner: hasS, isVBridgeCorner: hasS, isOuterCutoff: !hasS};
                    local_pts.SW  = {x: -h_bridge, y: h_bridge, isOuterCutoff: cutW};
                    local_pts.W_B = {x: -h_bridge, y: h_bridge, isBridgeCorner: hasW, isOuterCutoff: cutW};
                }
                
                let pts = {};
                for (let k in local_pts) {
                    let p = local_pts[k];
                    pts[k] = {
                        x: cx + p.x * cosA - p.y * sinA,
                        y: cy + p.x * sinA + p.y * cosA,
                        isBridgeCorner: p.isBridgeCorner,
                        isOuterCutoff: p.isOuterCutoff,
                        isVBridgeCorner: p.isVBridgeCorner
                    };
                    coords.set(`${r},${c},${k}`, pts[k]);
                }

                if (isPillOn) {
                    if (pts.N_L.x <= pts.NW.x) addLink(r, c, 'W_T', r, c, 'N_L');
                    else { addLink(r, c, 'W_T', r, c, 'NW'); addLink(r, c, 'NW', r, c, 'N_L'); }
                    
                    if (pts.N_R.x >= pts.NE.x) addLink(r, c, 'N_R', r, c, 'E_T');
                    else { addLink(r, c, 'N_R', r, c, 'NE'); addLink(r, c, 'NE', r, c, 'E_T'); }

                    if (pts.S_R.x >= pts.SE.x) addLink(r, c, 'E_B', r, c, 'S_R');
                    else { addLink(r, c, 'E_B', r, c, 'SE'); addLink(r, c, 'SE', r, c, 'S_R'); }

                    if (pts.S_L.x <= pts.SW.x) addLink(r, c, 'S_L', r, c, 'W_B');
                    else { addLink(r, c, 'S_L', r, c, 'SW'); addLink(r, c, 'SW', r, c, 'W_B'); }
                } else {
                    addLink(r, c, 'W_T', r, c, 'N_L');
                    addLink(r, c, 'N_R', r, c, 'E_T');
                    addLink(r, c, 'E_B', r, c, 'S_R');
                    addLink(r, c, 'S_L', r, c, 'W_B');
                }

                if (hasE) {
                    if (layoutMode === 'timeline' && timelineSubMode === 'wave' && wavyLine) {
                        let segments = 20;
                        let out_T_prev = 'E_T';
                        
                        let et_x = cx + (W/2 - inc*(h_bridge/H));
                        let inc_next = I_grid[r][c+1];
                        let wt_x = cx_grid[r][c+1] - (W_grid[r][c+1]/2 - inc_next*(h_bridge/H_grid[r][c+1]));
                        
                        for(let s=1; s<=segments; s++) {
                            let t = s / (segments + 1);
                            let id_T = `bridge_T_${r}_${c}_${s}`;
                            let id_B = `bridge_B_${r}_${c}_${s}`;
                            
                            let sampleX_precise = et_x + t * (wt_x - et_x);
                            let normX_samp = (sampleX_precise - startX) / totalLength;
                            let sampleY = cy_arr[r] + Math.sin(normX_samp * waveFrequency * Math.PI * 2) * waveAmplitude;
                            let dYdX = waveAmplitude * Math.cos(normX_samp * waveFrequency * Math.PI * 2) * (waveFrequency * Math.PI * 2 / totalLength);
                            let angle = Math.atan(dYdX);
                            
                            let sinAng = Math.sin(angle), cosAng = Math.cos(angle);
                            
                            let bTop = { x: sampleX_precise + h_bridge * sinAng, y: sampleY - h_bridge * cosAng, isSharp: true };
                            let bBot = { x: sampleX_precise - h_bridge * sinAng, y: sampleY + h_bridge * cosAng, isSharp: true };
                            
                            coords.set(`${r},${c},${id_T}`, bTop);
                            coords.set(`${r},${c},${id_B}`, bBot);
                            
                            addLink(r, c, out_T_prev, r, c, id_T);
                            out_T_prev = id_T;
                        }
                        addLink(r, c, out_T_prev, r, c+1, 'W_T');
                        
                        let out_B_prev_id = 'W_B';
                        let prev_r = r, prev_c = c+1;
                        for(let s=segments; s>=1; s--) {
                            let id_B = `bridge_B_${r}_${c}_${s}`;
                            addLink(prev_r, prev_c, out_B_prev_id, r, c, id_B);
                            prev_r = r; prev_c = c;
                            out_B_prev_id = id_B;
                        }
                        addLink(prev_r, prev_c, out_B_prev_id, r, c, 'E_B');
                    } else {
                        addLink(r, c, 'E_T', r, c+1, 'W_T');
                        addLink(r, c+1, 'W_B', r, c, 'E_B');
                    }
                } else {
                    if (infiniteEdges && c === N - 1) {
                        let capX = W/2 + HUGE_EXT;
                        coords.set(`${r},${c},Out_ET`, {x: cx + capX * cosA - (-h_bridge) * sinA, y: cy + capX * sinA + (-h_bridge) * cosA, isBridgeCorner: true});
                        coords.set(`${r},${c},Out_EB`, {x: cx + capX * cosA - (h_bridge) * sinA, y: cy + capX * sinA + (h_bridge) * cosA, isBridgeCorner: true});
                        addLink(r, c, 'E_T', r, c, 'Out_ET');
                        addLink(r, c, 'Out_ET', r, c, 'Out_EB');
                        addLink(r, c, 'Out_EB', r, c, 'E_B');
                        pts.E_T.isBridgeCorner = true;
                        pts.E_B.isBridgeCorner = true;
                    } else {
                        if (inc > 0.001) {

      { id: 'lib-2', name: 'Shape 2', viewBox: '0 0 254 254', inner: '<path d="M126.839 0C151.776 5.05753e-05 171.991 20.2154 171.991 45.1523V49.6016H186.439C200.276 49.6016 211.493 60.8193 211.493 74.6562V81.7861C235.051 83.3102 253.687 102.898 253.687 126.841C253.686 150.784 235.051 170.369 211.493 171.894V178.424C211.493 192.261 200.276 203.478 186.439 203.478H171.991V208.534C171.991 233.471 151.776 253.686 126.839 253.687C101.902 253.687 81.6865 233.471 81.6865 208.534V203.478H69.0068C55.1701 203.477 43.9532 192.261 43.9531 178.424V171.977C19.5705 171.341 8.11491e-05 151.377 0 126.841C0 102.305 19.5705 82.34 43.9531 81.7041V74.6562C43.9531 60.8194 55.17 49.6017 69.0068 49.6016H81.6865V45.1523C81.6867 20.2154 101.902 -1.09003e-06 126.839 0Z" />' },
      { id: 'lib-3', name: 'Shape 3', viewBox: '0 0 232 232', inner: '<path d="M231.282 94.8171L115.645 0L0 94.8171V113.777H9.07194C20.3131 113.777 29.4173 122.887 29.4173 134.116V231.247H201.865V134.116C201.865 122.878 210.977 113.777 222.21 113.777H231.282V94.8171Z" />' },
      { id: 'lib-4', name: 'Shape 4', viewBox: '0 0 176 226', inner: '<path d="M113 0C135.218 0 155.938 6.4128 173.411 17.4881C178.163 20.5 173.711 27.9576 168.145 27.1419C164.003 26.535 159.766 26.2207 155.455 26.2207C107.528 26.2207 68.6758 65.0733 68.6758 113C68.6758 160.927 107.528 199.779 155.455 199.779C159.766 199.779 164.003 199.465 168.145 198.858C173.712 198.042 178.163 205.499 173.412 208.511C155.939 219.587 135.219 226 113 226C50.5919 226 0 175.408 0 113C0 50.5919 50.5919 0.000102084 113 0Z" />' }
    ];

    const colorPalettes = [
        { label: 'Core Tawuniya', colors: ['#34295E', '#6B47F5', '#F2D2FF', '#BC96FC', '#FBEBFF', '#120449'] },
        { label: 'Extended', colors: ['#120449', '#1E0D60', '#2A1678', '#372090', '#4429A9', '#5133C2', '#5E3DDC', '#6B47F5', '#805DF3', '#9C7BF4', '#BC96FC', '#D1AEFF', '#E2C1FF', '#F2D2FF', '#FBEBFF'] },
        { label: 'B2C', colors: ['#1A2E1C', '#1F4026', '#225432', '#246A42', '#278354', '#2DA067', '#32BE7A', '#42D18E', '#51DDAE', '#62E7CC', '#74EFE6', '#8AF5F6', '#A4F8FA', '#BFFAFD', '#DBFCFF'] },
        { label: 'B2B', colors: ['#282222', '#382E2E', '#483A3A', '#594646', '#6A5151', '#7C5A59', '#92635C', '#A8715F', '#B88368', '#C79872', '#D2A881', '#DCB692', '#E5C4A5', '#EDD2B8', '#F4E0CD'] },
        { label: 'B2G', colors: ['#273449', '#35435B', '#4A576C', '#556174', '#646E80', '#727C8C', '#808998', '#8E97A5', '#9CA4B1', '#AAB1BD', '#B8BFC9', '#C7CCD5', '#D5D9E1', '#E3E7ED', '#F1F4F9'] }
    ];
    const allColors = Array.from(new Set(colorPalettes.flatMap(p => p.colors)));

    const App = () => {
      // Main Logic Parameters
      const [layoutMode, setLayoutMode] = useState('timeline'); // timeline, cycle, ecosystem
      const [timelineSubMode, setTimelineSubMode] = useState('straight'); // straight, wave, steps
      const [wavyLine, setWavyLine] = useState(false);
      const [stepComposition, setStepComposition] = useState('up'); // up, down, up-curve, down-curve
      const [stepDistance, setStepDistance] = useState(100);

      const [lineCount, setLineCount] = useState(3); // reused for elements count
      const [loopCount, setLoopCount] = useState(6); // sides for cycle
      const [patternRowCount, setPatternRowCount] = useState(5);
      
      const [elementShape, setElementShape] = useState('smooth-pill'); // rounded-rect, smooth-pill
      
      const [rotation, setRotation] = useState(0); 
      const [infiniteEdges, setInfiniteEdges] = useState(true);
      const [verticalModeOn, setVerticalModeOn] = useState(false);

      const [waveFrequency, setWaveFrequency] = useState(1);
      const [waveAmplitude, setWaveAmplitude] = useState(100);

      // Halftone specific
      const [halftonePixels, setHalftonePixels] = useState(generateDefaultHalftone());
      const [halftoneImgSrc, setHalftoneImgSrc] = useState(null);

      // Custom Objects State
      const [library, setLibrary] = useState(initialLibrary);
      const [swaps, setSwaps] = useState({});
      const [selectedSwapIdx, setSelectedSwapIdx] = useState(0);

      const shapeCount = layoutMode === 'timeline' ? lineCount : (layoutMode === 'cycle' ? loopCount : lineCount);

      useEffect(() => {
        if (selectedSwapIdx >= shapeCount) setSelectedSwapIdx(Math.max(0, shapeCount - 1));
      }, [shapeCount, selectedSwapIdx]);

      // Grid Connection States
      const [gridPills, setGridPills] = useState(createGrid(80, 40, true));
      const [gridHBridges, setGridHBridges] = useState(createGrid(80, 40, true));
      const [gridVBridges, setGridVBridges] = useState(createGrid(80, 40, false));

      // Dimensions
      const [pillLength, setPillLength] = useState(450);
      const [bridgeGap, setBridgeGap] = useState(180); 
      const [pillHeight, setPillHeight] = useState(160);
      const [bridgeThickness, setBridgeThickness] = useState(4);
      const [patternRowSpacing, setPatternRowSpacing] = useState(250);
      const [loopFillRatio, setLoopFillRatio] = useState(0.65); 

      // Variation Arrays 
      const [vRowSpacings, setVRowSpacings] = useState(Array(80).fill(1));
      const [vHeights, setVHeights] = useState(createGrid(80, 40, 1));
      const [vLengths, setVLengths] = useState(createGrid(80, 40, 1));
      const [vGaps, setVGaps] = useState(createGrid(80, 40, 1));
      const [activeVarTab, setActiveVarTab] = useState('rowGap');

      // Interaction States
      const [hoveredRow, setHoveredRow] = useState(null);
      const [selectedRow, setSelectedRow] = useState(null);

      // Colors
      const [bgColor, setBgColor] = useState('#D9D2F6');
      const [shapeSolidColor, setShapeSolidColor] = useState('#3E2568');

      // UI State
      const [showCode, setShowCode] = useState(false);
      const [copyStatus, setCopyStatus] = useState('');
      const [coreOpen, setCoreOpen] = useState(true);
      const [dimenOpen, setDimenOpen] = useState(false);
      const [varOpen, setVarOpen] = useState(false);
      const [objectsOpen, setObjectsOpen] = useState(false);
      const [colorsOpen, setColorsOpen] = useState(false);

      // --- HISTORY & UNDO/REDO SYSTEM ---
      const [history, setHistory] = useState([]);
      const historyIndexRef = useRef(0);
      const [historyIndex, setHistoryIndexState] = useState(0);
      const isUndoRedo = useRef(false);
      const [historyTrigger, setHistoryTrigger] = useState(0);

      const setHistoryIndex = (idx) => {
          historyIndexRef.current = idx;
          setHistoryIndexState(idx);
      };

      const captureState = () => ({
          layoutMode, timelineSubMode, wavyLine, stepComposition, stepDistance,
          lineCount, loopCount, patternRowCount, elementShape,
          rotation, infiniteEdges, verticalModeOn, waveFrequency, waveAmplitude,
          pillLength, bridgeGap, pillHeight, bridgeThickness, patternRowSpacing, loopFillRatio,
          gridPills, gridHBridges, gridVBridges, vRowSpacings, vHeights, vLengths,
          vGaps, bgColor, shapeSolidColor, library, swaps
      });

      const applyState = (state) => {
          if (state.layoutMode) setLayoutMode(state.layoutMode);
          if (state.timelineSubMode) setTimelineSubMode(state.timelineSubMode);
          if (state.wavyLine !== undefined) setWavyLine(state.wavyLine);
          if (state.stepComposition) setStepComposition(state.stepComposition);
          if (state.stepDistance !== undefined) setStepDistance(state.stepDistance);
          if (state.lineCount !== undefined) setLineCount(state.lineCount);
          if (state.loopCount !== undefined) setLoopCount(state.loopCount);
          if (state.patternRowCount !== undefined) setPatternRowCount(state.patternRowCount);
          if (state.elementShape) setElementShape(state.elementShape);
          if (state.rotation !== undefined) setRotation(state.rotation);
          if (state.infiniteEdges !== undefined) setInfiniteEdges(state.infiniteEdges);
          if (state.verticalModeOn !== undefined) setVerticalModeOn(state.verticalModeOn);
          if (state.waveFrequency !== undefined) setWaveFrequency(state.waveFrequency);
          if (state.waveAmplitude !== undefined) setWaveAmplitude(state.waveAmplitude);
          if (state.pillLength !== undefined) setPillLength(state.pillLength);
          if (state.bridgeGap !== undefined) setBridgeGap(state.bridgeGap);
          if (state.pillHeight !== undefined) setPillHeight(state.pillHeight);
          if (state.bridgeThickness !== undefined) setBridgeThickness(state.bridgeThickness);
          if (state.patternRowSpacing !== undefined) setPatternRowSpacing(state.patternRowSpacing);
          if (state.loopFillRatio !== undefined) setLoopFillRatio(state.loopFillRatio);
          if (state.gridPills) setGridPills(state.gridPills);
          if (state.gridHBridges) setGridHBridges(state.gridHBridges);
          if (state.gridVBridges) setGridVBridges(state.gridVBridges);
          if (state.vRowSpacings) setVRowSpacings(state.vRowSpacings);
          if (state.vHeights) setVHeights(state.vHeights);
          if (state.vLengths) setVLengths(state.vLengths);
          if (state.vGaps) setVGaps(state.vGaps);
          if (state.bgColor) setBgColor(state.bgColor);
          if (state.shapeSolidColor) setShapeSolidColor(state.shapeSolidColor);
          if (state.library) setLibrary(state.library);
          if (state.swaps) setSwaps(state.swaps);
      };

      useEffect(() => {
          const initialState = captureState();
          setHistory([initialState]);
          setHistoryIndex(0);
      }, []);

      useEffect(() => {
          if (historyTrigger > 0) {
              const currentState = captureState();
              setHistory(prev => {
                  const newHistory = prev.slice(0, historyIndexRef.current + 1);
                  const lastState = newHistory[newHistory.length - 1];
                  if (lastState && JSON.stringify(lastState) === JSON.stringify(currentState)) return prev;
                  newHistory.push(currentState);
                  if (newHistory.length > 50) newHistory.shift();
                  setHistoryIndex(newHistory.length - 1);
                  return newHistory;
              });
          }
      }, [historyTrigger]);

      const savePreState = () => {
          const preState = captureState();
          setHistory(prev => {
              const newHistory = prev.slice(0, historyIndexRef.current + 1);
              const lastState = newHistory[newHistory.length - 1];
              if (!lastState || JSON.stringify(lastState) !== JSON.stringify(preState)) {
                  newHistory.push(preState);
                  if (newHistory.length > 50) newHistory.shift();
                  setHistoryIndex(newHistory.length - 1);
              }
              return newHistory;
          });
      };

      const handleUndo = () => {
          if (historyIndexRef.current > 0) {
              const prevIndex = historyIndexRef.current - 1;
              isUndoRedo.current = true;
              setHistoryIndex(prevIndex);
              applyState(history[prevIndex]);
          }
      };

      const handleRedo = () => {
          if (historyIndexRef.current < history.length - 1) {
              const nextIndex = historyIndexRef.current + 1;
              isUndoRedo.current = true;
              setHistoryIndex(nextIndex);
              applyState(history[nextIndex]);
          }
      };
      // --- END HISTORY SYSTEM ---

      const headerColor = shapeSolidColor;

      const handleLayoutMode = (mode) => {
        setLayoutMode(mode);
        setSelectedRow(null);
        if (mode === 'timeline') {
          setLineCount(Math.min(lineCount, 20));
          setPillLength(Math.max(40, pillLength));
          setPillHeight(Math.max(40, pillHeight));
        } else if (mode === 'ecosystem') {
          setLineCount(Math.min(lineCount, 10));
          setPatternRowCount(Math.min(patternRowCount, 20));
        } else if (mode === 'halftone') {
          setLineCount(Math.max(10, Math.min(lineCount, 40)));
          setPatternRowCount(Math.max(10, Math.min(patternRowCount, 80)));
        }
        if (mode !== 'ecosystem' && activeVarTab === 'rowGap') setActiveVarTab('height');
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        setHalftoneImgSrc(url);
        
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_DIM = 100;
          let w = img.width, h = img.height;
          if(w > h) { h = Math.floor(h * MAX_DIM / w); w = MAX_DIM; }
          else { w = Math.floor(w * MAX_DIM / h); h = MAX_DIM; }
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const imgData = ctx.getImageData(0, 0, w, h);
          const lums = new Float32Array(w * h);
          for(let i=0; i<w*h; i++) {
             let r = imgData.data[i*4], g = imgData.data[i*4+1], b = imgData.data[i*4+2];
             lums[i] = (0.299*r + 0.587*g + 0.114*b) / 255.0;
          }
          setHalftonePixels({ w, h, lums });
        };
        img.src = url;
      };

      const handleCustomObjectUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const vbMatch = text.match(/viewBox=["']([^"']+)["']/);
          const viewBox = vbMatch ? vbMatch[1] : '0 0 100 100';
          const innerMatch = text.match(/<svg[^>]*>([\s\S]*?)<\/svg>/i);
          if (innerMatch) {
            let inner = innerMatch[1].replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
            const newItem = {
              id: 'custom-' + Date.now(),
              name: file.name.replace('.svg', ''),
              viewBox,
              inner
            };
            setLibrary(prev => [...prev, newItem]);
          }
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const handleExportJson = () => {
        const state = captureState();
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'tawuniya-setup.json';
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportJson = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        savePreState();
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const state = JSON.parse(event.target.result);
            applyState(state);
            setTimeout(() => setHistoryTrigger(t => t + 1), 0);
          } catch (err) {
            alert("Invalid JSON file");
          }
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const getPresetArray = (type, min, max, base, count) => {
        const arr = Array(80).fill(base);
        for(let i=0; i<count; i++) {
          if (type === 'gradual') arr[i] = count > 1 ? min + (max - min) * (i / (count - 1)) : max;
          else if (type === 'wave') arr[i] = count > 1 ? min + (max - min) * Math.sin((i / (count - 1)) * Math.PI) : max;
          else if (type === 'zig-zag') arr[i] = i % 2 === 0 ? max : min;
          else if (type === 'random') arr[i] = min + Math.random() * (max - min);
          else if (type === 'reset') arr[i] = base;
        }
        return arr;
      };

      const applyVarPreset = (rowIdx, type, stateArr, setter, min, max, base) => {
        const newArr = [...stateArr];
        newArr[rowIdx] = getPresetArray(type, min, max, base, shapeCount);
        setter(newArr);
      };

      const applySwapDirection = (rowIdx, stateArr, setter, min, max) => {
        const newArr = [...stateArr];
        const newRow = [...newArr[rowIdx]];
        for(let i=0; i<shapeCount; i++) newRow[i] = min + max - newRow[i];
        newArr[rowIdx] = newRow;
        setter(newArr);
      };

      const applyToAllRows = (rowIdx, stateArr, setter) => {
        const newArr = [...stateArr];
        const refRow = [...newArr[rowIdx]];
        for(let i=0; i<80; i++) newArr[i] = [...refRow];
        setter(newArr);
      };

      const applyToAltRows = (rowIdx, stateArr, setter) => {
        const newArr = [...stateArr];
        const refRow = [...newArr[rowIdx]];
        const isEven = rowIdx % 2 === 0;
        for(let i=0; i<80; i++) if ((i % 2 === 0) === isEven) newArr[i] = [...refRow];
        setter(newArr);
      };

      const apply1DVarPreset = (type, stateArr, setter, min, max, base, count) => {
        const preset = getPresetArray(type, min, max, base, count);
        const newArr = Array(80).fill(base);
        for(let i=0; i<count; i++) newArr[i] = preset[i];
        setter(newArr);
      };

      const apply1DSwapDirection = (stateArr, setter, min, max, count) => {
        const n = [...stateArr];
        for(let i=0; i<count; i++) n[i] = min + max - n[i];
        setter(n);
      };

      const handleRandomiseColors = () => {
        const pIdx = Math.floor(Math.random() * colorPalettes.length);
        const palette = colorPalettes[pIdx].colors;
        const bgI = Math.floor(Math.random() * palette.length);
        setBgColor(palette[bgI]);
        const validFg = palette.filter((_, idx) => Math.abs(idx - bgI) >= 2);
        if (validFg.length > 0) {
            setShapeSolidColor(validFg[Math.floor(Math.random() * validFg.length)]);
        } else {
            setShapeSolidColor(palette[(bgI + 2) % palette.length]);
        }
      };

      const handleResetAll = () => {
        savePreState();
        setLayoutMode('timeline');
        setTimelineSubMode('straight');
        setWavyLine(false);
        setStepComposition('up');
        setStepDistance(100);
        setLineCount(3);
        setLoopCount(6);
        setPatternRowCount(5);
        setElementShape('smooth-pill');
        setRotation(0);
        setInfiniteEdges(true);
        setVerticalModeOn(false);
        setPillLength(450);
        setBridgeGap(180);
        setPillHeight(160);
        setBridgeThickness(4);
        setPatternRowSpacing(250);
        setLoopFillRatio(0.65);
        setWaveFrequency(1);
        setWaveAmplitude(100);
        setSwaps({});

        setGridPills(createGrid(80, 40, true));
        setGridHBridges(createGrid(80, 40, true));
        setGridVBridges(createGrid(80, 40, false));

        setVRowSpacings(Array(80).fill(1));
        setVHeights(createGrid(80, 40, 1));
        setVLengths(createGrid(80, 40, 1));
        setVGaps(createGrid(80, 40, 1));

        setBgColor('#D9D2F6');
        setShapeSolidColor('#3E2568');
        setSelectedRow(null);
        setHistoryTrigger(t => t + 1);
      };

      const handleRandomise = (isDynamic, forceMode = null) => {
        savePreState();
        const modeList = ['timeline', 'cycle', 'ecosystem']; 
        const mode = forceMode || modeList[Math.floor(Math.random() * modeList.length)];
        setLayoutMode(mode);
        setSelectedRow(null);
        setInfiniteEdges(true);
        setVerticalModeOn(false);
        setSwaps({});

        let newShapeCount = shapeCount;
        let newWaveFreq = 1;
        let newRotation = Math.floor(Math.random() * 16) * 22.5;

        if (mode === 'timeline' || mode === 'ecosystem') {
          newShapeCount = Math.floor(Math.random() * (mode === 'ecosystem' ? 10 : 8)) + 1;
          setLineCount(newShapeCount);
          setElementShape(Math.random() > 0.5 ? 'smooth-pill' : 'rounded-rect');
          setBridgeGap(Math.floor(Math.random() * 641) + 160); 
          const pH = Math.floor(Math.random() * 321) + 80; 
          setPillHeight(pH);
          const thickMax = Math.min(7, Math.max(4, pH - 1)); 
          setBridgeThickness(Math.floor(Math.random() * (thickMax - 4 + 1)) + 4); 
          
          if (mode === 'ecosystem') {
            setPillLength(Math.floor(Math.random() * 301) + 100); 
            setPatternRowCount(Math.floor(Math.random() * 16) + 5); 
            setPatternRowSpacing(Math.floor(Math.random() * 400) + 100);
            
            setGridPills(createGrid(80, 40, true)); 
            setGridHBridges(createGrid(80, 40, true)); 
            setGridVBridges(createGrid(80, 40, false));
          } else if (mode === 'timeline') {
             setPillLength(Math.floor(Math.random() * 601) + 400); 
             if (Math.random() > 0.6) {
                setTimelineSubMode('wave');
                setWaveFrequency(Math.floor(Math.random() * 3) + 1);
                setWaveAmplitude(Math.floor(Math.random() * 400) + 100);
                setWavyLine(Math.random() > 0.5);
             } else if (Math.random() > 0.5) {
                setTimelineSubMode('steps');
                setStepDistance(Math.floor(Math.random() * 300) + 50);
                const comps = ['up', 'down', 'up-curve', 'down-curve'];
                setStepComposition(comps[Math.floor(Math.random() * comps.length)]);
             } else {
                setTimelineSubMode('straight');
             }
          }
        } else if (mode === 'cycle') {
          newShapeCount = Math.floor(Math.random() * 15) + 3;
          setLoopCount(newShapeCount);
          setElementShape(Math.random() > 0.5 ? 'smooth-pill' : 'rounded-rect');
          setLoopFillRatio(Math.random() * 0.70 + 0.20); 
          const pH = Math.floor(Math.random() * 121) + 80; 
          setPillHeight(pH);
          const thickMax = Math.min(7, Math.max(4, pH - 1)); 
          setBridgeThickness(Math.floor(Math.random() * (thickMax - 4 + 1)) + 4); 
        }

        setRotation(newRotation); 

        let nH = createGrid(80, 40, 1), nL = createGrid(80, 40, 1);
        let nRS = Array(80).fill(1);
        let nG = [...vGaps]; 

        if (isDynamic) {
          const presets = ['gradual', 'wave'];
          const rows = mode === 'ecosystem' ? 40 : 1;
          const isAlternate = mode === 'ecosystem' && Math.random() > 0.5;

          let pA = presets[Math.floor(Math.random() * presets.length)];
          let arrA_H = getPresetArray(pA, 0.3, 2.0, 1, newShapeCount);
          let arrA_L = getPresetArray(pA, 0.3, 2.0, 1, newShapeCount);

          let pB = presets[Math.floor(Math.random() * presets.length)];
          let arrB_H = isAlternate ? getPresetArray(pB, 0.3, 2.0, 1, newShapeCount) : arrA_H;
          let arrB_L = isAlternate ? getPresetArray(pB, 0.3, 2.0, 1, newShapeCount) : arrA_L;

          for(let r=0; r<rows; r++) {
              nH[r] = r % 2 === 0 ? arrA_H : arrB_H;
              nL[r] = r % 2 === 0 ? arrA_L : arrB_L;
          }
          if (mode === 'ecosystem') nRS = getPresetArray(presets[Math.floor(Math.random() * presets.length)], 0.3, 2.0, 1, 39);
        }

        setVHeights(nH); setVLengths(nL); setVRowSpacings(nRS);
        handleRandomiseColors();

                <button onClick={() => handleRandomise(true)} className="flex-1 py-2 px-1 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 rounded-lg text-[9px] uppercase tracking-wider font-bold flex items-center justify-center gap-1 transition-all shadow-sm active:scale-[0.98]"><Icon name="Shuffle" size={12} /> Dynamic</button>
                <button onClick={handleResetAll} className="w-9 shrink-0 py-2 bg-red-50 hover:bg-red-100 border border-red-200 text-red-700 rounded-lg flex items-center justify-center transition-all shadow-sm active:scale-[0.98]" title="Reset All"><Icon name="RefreshCcw" size={14} /></button>
              </div>
              <div className="flex gap-2">
                <button onClick={handleDownload} className="flex-1 py-3 px-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold flex items-center justify-center gap-2 transition-all shadow-sm hover:shadow active:scale-[0.98]"><Icon name="Download" size={18} /> Download</button>
                <button onClick={() => copyToClipboard(svgMarkup)} className="flex-1 py-3 px-2 bg-white hover:bg-neutral-50 border border-neutral-300 text-neutral-700 rounded-lg font-semibold flex items-center justify-center gap-2 transition-all shadow-sm active:scale-[0.98]">{copyStatus ? <span className="text-indigo-600 text-sm">{copyStatus}</span> : <><Icon name="Copy" size={18} /> Copy Code</>}</button>
              </div>
            </div>
          </div>

          {/* RIGHT PANEL: Canvas */}
          <div className="flex-1 relative flex flex-col overflow-hidden min-h-[50vh] md:min-h-screen">
            
            {/* Branding Header */}
            <div className="absolute top-0 left-0 right-0 z-10 flex items-center pointer-events-none" style={{ paddingLeft: '25px', paddingTop: '25px' }}>
              <svg width="56" height="56" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ marginRight: '17px', flexShrink: 0 }}>
                <path d="M49.3268 24.3141C47.8181 26.944 47.5478 29.578 47.5994 32.3039C47.6471 34.9378 47.6968 37.4218 46.3869 39.7037C45.246 41.6917 43.5126 42.9177 41.6104 44.0916C41.2983 44.2836 40.9842 44.4756 40.6642 44.6676C38.4021 46.0216 36.0606 47.4315 34.6135 49.9515C31.7094 55.0114 33.3572 59.0993 33.4268 59.2693C33.6375 59.7752 34.1642 60.0712 34.7009 59.9852C43.6875 58.5333 51.4418 53.1674 55.9718 45.2736C60.5079 37.3698 61.2513 27.928 58.0073 19.3722C57.9854 19.3142 57.9576 19.2582 57.9278 19.2042C57.7111 18.8282 57.3016 18.5902 56.8544 18.6102C56.6616 18.6162 52.3482 19.0482 49.3268 24.3161V24.3141ZM56.9041 19.6082C56.9757 19.6062 57.0293 19.6462 57.0591 19.6882C57.6257 22.5001 57.1903 25.4501 55.7651 28.46C54.5784 30.9619 52.7139 33.5099 50.2173 36.0358C49.5355 36.7258 48.8418 37.3778 48.16 37.9838C48.6629 36.1218 48.6291 34.1939 48.5953 32.3119V32.2839C48.5496 29.926 48.7106 27.39 50.1895 24.8141C52.9365 20.0262 56.761 19.6202 56.9061 19.6082H56.9041Z" fill={headerColor}/>
                <path d="M15.292 16.2696C18.3114 16.2696 20.7126 15.1896 23.0323 13.7797C25.2765 12.4197 27.3894 11.1357 30.0073 11.1357C32.2892 11.1357 34.2114 12.0337 36.1713 13.1037C36.4933 13.2797 36.8153 13.4577 37.1394 13.6397C39.4352 14.9336 41.8205 16.2696 44.7127 16.2696C50.5209 16.2696 53.2143 12.7897 53.3256 12.6457C53.6556 12.2077 53.6476 11.6017 53.3037 11.1777C47.5611 4.0739 39.0655 0 30.0053 0C20.9352 0 12.4356 4.0739 6.693 11.1777C6.65325 11.2257 6.61946 11.2777 6.58765 11.3317C6.37099 11.7077 6.37099 12.1837 6.61349 12.5637C6.71487 12.7277 9.24329 16.2716 15.288 16.2696H15.292ZM7.45232 12.0197C7.41456 11.9597 7.42251 11.8897 7.44437 11.8437C9.5812 9.94376 12.3382 8.84778 15.6419 8.58579C18.3889 8.36779 21.5156 8.71978 24.9366 9.63176C25.8708 9.88175 26.7792 10.1598 27.6419 10.4497C25.7873 10.9417 24.1454 11.9357 22.5433 12.9077L22.5195 12.9217C20.5138 14.1397 18.2498 15.2676 15.292 15.2676C9.79588 15.2676 7.53581 12.1377 7.45232 12.0177V12.0197Z" fill={headerColor}/>
                <path d="M25.3857 49.9455C23.877 47.3156 21.7461 45.7636 19.3727 44.4456C17.0809 43.1697 14.9182 41.9717 13.6083 39.6898C12.4673 37.7018 12.2785 35.5779 12.2208 33.3339C12.2109 32.9659 12.2049 32.5959 12.199 32.2219C12.1652 29.574 12.1214 26.8281 10.6743 24.3081C7.77025 19.2483 3.42702 18.6403 3.24812 18.6163C2.70745 18.5463 2.18865 18.8583 1.99385 19.3683C-1.25015 27.924 -0.508728 37.3638 4.02135 45.2576C8.55739 53.1614 16.3136 58.5313 25.2982 59.9813C25.3598 59.9913 25.4215 59.9953 25.4831 59.9953C25.9144 59.9953 26.3259 59.7573 26.5306 59.3553C26.6221 59.1853 28.4071 55.2094 25.3837 49.9435L25.3857 49.9455ZM25.6461 58.9013C25.6123 58.9653 25.5507 58.9913 25.499 58.9953C22.7956 58.0833 20.4739 56.2294 18.5955 53.4814C17.0351 51.1975 15.7749 48.2975 14.8486 44.8596C14.5962 43.9197 14.3815 42.9917 14.2006 42.0917C15.5523 43.4617 17.228 44.3957 18.8659 45.3056L18.8897 45.3196C20.9411 46.4576 23.0441 47.8676 24.523 50.4435C27.2701 55.2314 25.7057 58.7673 25.6461 58.8993V58.9013Z" fill={headerColor}/>
              </svg>
              <div className="flex flex-col">
                <h1 style={{ fontSize: '25px', fontWeight: 400, color: headerColor, lineHeight: 1 }}>The Life Line</h1>
                <p style={{ fontSize: '25px', fontWeight: 250, color: headerColor, opacity: 1, lineHeight: 1, marginTop: '4px' }}>Tawuniya graphic language</p>
              </div>
            </div>

            {/* Workspace Area */}
            <div className="flex-1 relative w-full h-full overflow-hidden">
              <div className="absolute inset-0 flex items-center justify-center p-12">
<svg xmlns="http://www.w3.org/2000/svg" viewBox={viewBox} className="w-full h-full" preserveAspectRatio="xMidYMid meet" style={{ overflow: 'visible' }}>
  <g>
    {verticalModeOn || layoutMode !== 'ecosystem' ? (
      <path d={pathDataArray.join(" ")} fill={shapeSolidColor} fillRule="evenodd" className="transition-all duration-300 ease-out" />
    ) : (
      pathDataArray.map((d, r) => (
        <path 
        key={r} d={d} fill={hoveredRow === r ? 'white' : shapeSolidColor} fillRule="evenodd" 
        className="transition-all duration-300 ease-out cursor-pointer"
        style={{ opacity: hoveredRow !== null && hoveredRow !== r ? 0.5 : 1 }}
        onMouseEnter={() => setHoveredRow(r)} onMouseLeave={() => setHoveredRow(null)} onClick={() => setSelectedRow(r)}
        />
      ))
    )}

    {/* Overlaid Custom Swapped Objects */}
    {swapCenters.map(sc => {
       const libItem = library.find(l => l.id === sc.swapData.libraryId);
       if (!libItem) return null;
       let vbParts = libItem.viewBox.split(' ').map(Number);
       let w = vbParts[2] || 100, h_svg = vbParts[3] || 100;
       let ox = -(vbParts[0] || 0) - w/2, oy = -(vbParts[1] || 0) - h_svg/2;
       const totalRot = rotation + (sc.angleRad * 180 / Math.PI) + sc.swapData.rotation;
       
       let innerHtml = libItem.inner.replace(/fill="[^"]*"/gi, 'fill="currentColor"');
       if (!innerHtml.includes('fill=')) innerHtml = `<g fill="currentColor">${innerHtml}</g>`;

return (
    <g key={`swap-${sc.c}`} transform={`translate(${sc.cx}, ${sc.cy}) rotate(${totalRot}) scale(${sc.swapData.scale})`} style={{ color: shapeSolidColor }}>
        <g transform={`translate(${ox}, ${oy})`} dangerouslySetInnerHTML={{ __html: innerHtml }} />
    </g>
);
    })}
  </g>
</svg>
              </div>

              {/* Floating Panel for Pattern Mode Selection (only if vertical mode is off) */}
              {selectedRow !== null && layoutMode === 'ecosystem' && !verticalModeOn && (
                <div className="absolute bottom-6 left-6 z-20 w-80 max-h-[70vh] flex flex-col bg-white/95 backdrop-blur-md rounded-xl shadow-2xl border border-neutral-200 overflow-hidden">
                  <div className="p-4 border-b border-neutral-200 flex justify-between items-center bg-white">
                    <h3 className="text-sm font-bold text-neutral-800">Row {selectedRow + 1} Variations</h3>
                    <button onClick={() => setSelectedRow(null)} className="text-neutral-400 hover:text-neutral-800 p-1"><Icon name="Plus" size={16} className="rotate-45" /></button>
                  </div>
                  <div className="p-4 overflow-y-auto hide-scrollbar">
                    <div className="flex bg-neutral-100 p-1 rounded-lg border border-neutral-200 mb-4">
                      <button onClick={()=>setActiveVarTab('height')} className={`flex-1 py-1.5 px-2 text-[10px] uppercase font-bold rounded ${activeVarTab === 'height' ? 'bg-white shadow text-neutral-900' : 'text-neutral-500'}`}>Height</button>
                      <button onClick={()=>setActiveVarTab('length')} className={`flex-1 py-1.5 px-2 text-[10px] uppercase font-bold rounded ${activeVarTab === 'length' ? 'bg-white shadow text-neutral-900' : 'text-neutral-500'}`}>Length</button>
                      <button onClick={()=>setActiveVarTab('gap')} className={`flex-1 py-1.5 px-2 text-[10px] uppercase font-bold rounded ${activeVarTab === 'gap' ? 'bg-white shadow text-neutral-900' : 'text-neutral-500'}`}>Gap</button>
                    </div>
                    {activeConf && renderVarSliders(activeConf.state, activeConf.setter, activeConf.min, activeConf.max, activeConf.step, activeConf.format, 1, selectedRow, true)}
                  </div>
                </div>
              )}
            </div>

            {/* View Controls */}
            <div className="absolute bottom-6 right-6 z-10 bg-white shadow-lg rounded-full p-1 border border-neutral-200 flex">
              <button onClick={() => setShowCode(false)} className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors flex items-center gap-2 ${!showCode ? 'bg-neutral-900 text-white' : 'text-neutral-600 hover:bg-neutral-100'}`}><Icon name="Shapes" size={16} /> Preview</button>
              <button onClick={() => setShowCode(true)} className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors flex items-center gap-2 ${showCode ? 'bg-neutral-900 text-white' : 'text-neutral-600 hover:bg-neutral-100'}`}><Icon name="Type" size={16} /> SVG Code</button>
            </div>

            {showCode && (
              <div className="absolute inset-0 z-0 bg-neutral-900/95 backdrop-blur-sm p-8 flex items-center justify-center">
                <div className="bg-neutral-800 border border-neutral-700 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col h-3/4">
                  <div className="flex justify-between items-center p-4 border-b border-neutral-700 bg-neutral-900">
                    <span className="text-neutral-300 font-mono text-sm">tawuniya-graphic-language.svg</span>
                    <button onClick={() => copyToClipboard(svgMarkup)} className="text-neutral-400 hover:text-white transition-colors p-2 rounded hover:bg-neutral-700" title="Copy Code"><Icon name="Copy" size={18} /></button>
                  </div>
                  <div className="p-4 overflow-auto flex-1 text-sm font-mono text-emerald-400 whitespace-pre-wrap">{svgMarkup}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
